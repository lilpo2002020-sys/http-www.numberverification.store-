<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b132b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN CARD */
.login-box {
    background: #1f2937;
    padding: 40px;
    border-radius: 16px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    text-align: center;
}

/* TITLE */
.login-box h2 {
    color: white;
    margin-bottom: 25px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #e5e7eb;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(to right, #3b82f6, #2563eb);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

/* ERROR */
.error {
    color: #ef4444;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

{% if error %}
<div class="error">{{error}}</div>
{% endif %}

<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

</div>

</body>
</html>
