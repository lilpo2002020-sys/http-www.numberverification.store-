<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b132b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.box {
    background: #1f2937;
    padding: 40px;
    border-radius: 16px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    text-align: center;
}

/* TITLE */
.box h2 {
    color: white;
    margin-bottom: 25px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    background: #e5e7eb;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(to right, #3b82f6, #2563eb);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* ALERTS */
.error {
    color: #ef4444;
    margin-bottom: 10px;
}

.success {
    color: #22c55e;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="box">

<h2>Change Password</h2>

{% if error %}
<div class="error">{{error}}</div>
{% endif %}

{% if success %}
<div class="success">{{success}}</div>
{% endif %}

<form method="POST">

<input type="password" name="old" placeholder="Old Password" required>

<input type="password" name="new" placeholder="New Password" required>

<input type="password" name="confirm" placeholder="Re-type Password" required>

<button type="submit">Update</button>

</form>

</div>

</body>
</html>
